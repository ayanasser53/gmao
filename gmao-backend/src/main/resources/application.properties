spring.application.name=gmao-backend

spring.datasource.url=jdbc:mysql://localhost:3307/gmao_mobility
spring.datasource.username=gmao_user
spring.datasource.password=gmao_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8090

jwt.secret=0123456789012345678901234567890123456789012345678901234567891234
jwt.expiration=86400000
app.upload-dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB